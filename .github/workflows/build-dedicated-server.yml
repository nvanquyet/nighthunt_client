name: "Build & Deploy Dedicated Server"

# ── Trigger ───────────────────────────────────────────────────────────────────
# Build KHÔNG tự động theo push thông thường.
# Để trigger build DS, dùng một trong hai cách:
#
#   1. Commit message chứa [build-ds]:
#        git commit -m "fix: fix server logic [build-ds]"
#        git push origin main
#
#   2. Thủ công qua GitHub UI / gh CLI:
#        gh workflow run build-dedicated-server.yml --ref main
#
on:
  push:
    branches: [ main ]

  # Build thủ công qua GitHub UI hoặc gh CLI
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild (bỏ qua cache)"
        type: boolean
        default: false

# ── Environment ───────────────────────────────────────────────────────────────
env:
  UNITY_VERSION: "6000.0.39f1"

  # Docker image sẽ được push lên GitHub Container Registry
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nighthunt-ds

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build Unity Dedicated Server (Linux x64) ─────────────────────────
  build-unity:
    name: "Unity Linux Server Build"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Chỉ build khi:
    #   - Trigger thủ công (workflow_dispatch), HOẶC
    #   - Push với commit message chứa [build-ds]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[build-ds]')
    outputs:
      version: ${{ steps.gen-version.outputs.version }}

    steps:
      # ── Free disk space trước khi pull Unity Docker image (~25-30 GB) ────────
      # GitHub runner Ubuntu chỉ có ~14 GB free → cần dọn pre-installed bloat
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache:           false   # Giữ lại tool cache (git, node, ...)
          android:              true    # ~9 GB
          dotnet:               true    # ~2 GB
          haskell:              true    # ~1 GB
          large-packages:       false  # Tắt — apt remove mất 10+ phút, khiến runner crash timeout
          docker-images:        true    # xoá image cũ
          swap-storage:         false  # GIỮ swap — Unity cần fallback khi RAM đầy

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          lfs: false        # DS build is headless — no textures/audio/models needed
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache LFS objects (avoid re-downloading on future runs)
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.gitattributes') }}-${{ github.sha }}
          restore-keys: |
            lfs-${{ runner.os }}-${{ hashFiles('.gitattributes') }}-
            lfs-${{ runner.os }}-

      # Version tag: YYYYMMDD-<short-sha>
      - name: Generate version
        id: gen-version
        run: |
          VERSION="$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # Cache thư mục Library (Unity cache - tăng tốc build đáng kể)
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key:  unity-lib-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/manifest.json') }}
          restore-keys: |
            unity-lib-${{ env.UNITY_VERSION }}-

      # Build Unity DS bằng GameCI
      # Docs: https://game.ci/docs/github/builder
      - name: Build Unity Dedicated Server
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:     ${{ env.UNITY_VERSION }}
          targetPlatform:   StandaloneLinux64
          buildMethod:      NightHunt.Build.BuildScript.BuildDedicatedServer
          # -standaloneBuildSubtarget và -buildOutput passed riêng, KHÔNG dùng -executeMethod (tránh duplicate với buildMethod)
          customParameters: >-
            -standaloneBuildSubtarget Server
            -buildOutput Build/Server/NightHuntDS
            -disableBurstCompilation

      - name: Locate and stage UnityPlayer.so
        run: |
          echo "=== Searching entire workspace for UnityPlayer.so ==="
          find . -name "UnityPlayer.so" 2>/dev/null | sort || true

          # game-ci may output UnityPlayer.so outside Build/Server/ (e.g. workspace root or Build/)
          UNITY_SO=$(find . -name "UnityPlayer.so" 2>/dev/null | head -1)
          if [ -n "${UNITY_SO}" ]; then
            echo "✅ Found: ${UNITY_SO}"
            if [ "${UNITY_SO}" != "./Build/Server/UnityPlayer.so" ]; then
              cp "${UNITY_SO}" Build/Server/UnityPlayer.so
              echo "✅ Copied to Build/Server/UnityPlayer.so"
            fi
          else
            echo "⚠️  UnityPlayer.so not found anywhere in workspace."
            echo "    game-ci image may be missing Linux Dedicated Server module."
            echo "    Checking Unity installation path..."
            find /opt/unity -name "UnityPlayer.so" 2>/dev/null | head -5 || true
          fi

      - name: Verify build output
        run: |
          echo "=== Build/Server contents ==="
          find Build/Server -type f | sort
          echo ""
          # Check binary
          test -f Build/Server/NightHuntDS.x86_64 || \
          test -f Build/Server/NightHuntDS || \
          (echo "❌ Binary not found!" && exit 1)
          chmod +x Build/Server/NightHuntDS.x86_64 2>/dev/null || chmod +x Build/Server/NightHuntDS 2>/dev/null || true
          # Check UnityPlayer.so
          test -f Build/Server/UnityPlayer.so || \
          (echo "❌ UnityPlayer.so missing — DS will crash. Check game-ci Unity image modules." && exit 1)
          echo "✅ Binary + UnityPlayer.so verified"

      # Upload artifact để job build-docker dùng
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name:           ds-build-${{ steps.gen-version.outputs.version }}
          path:           Build/Server/
          retention-days: 7
  build-docker:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    needs: build-unity
    if: needs.build-unity.result == 'success'
    permissions:
      contents: read
      packages: write   # Cần để push lên GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download Unity build từ job trước vào Docker build context
      - name: Download DS build artifact
        uses: actions/download-artifact@v4
        with:
          name: ds-build-${{ needs.build-unity.outputs.version }}
          path: Build/Server/

      - name: Prepare Docker context
        run: |
          echo "=== Artifact contents ==="
          ls -lah Build/Server/
          # Copy Unity build output INTO docker/dedicated-server/build/
          # Dockerfile does: COPY ./build/ /app/  (relative to context = docker/dedicated-server/)
          mkdir -p docker/dedicated-server/build
          cp -r Build/Server/* docker/dedicated-server/build/
          chmod +x docker/dedicated-server/build/NightHuntDS.x86_64 2>/dev/null || \
          chmod +x docker/dedicated-server/build/NightHuntDS          2>/dev/null || true
          echo "=== Docker context ==="
          ls -lah docker/dedicated-server/build/
          echo "✅ Context ready"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN auto-available, packages:write declared above — no extra secret needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.build-unity.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context:     docker/dedicated-server
          file:        docker/dedicated-server/Dockerfile
          push:        true
          tags:        ${{ steps.meta.outputs.tags }}
          labels:      ${{ steps.meta.outputs.labels }}
          platforms:   linux/amd64
          cache-from:  type=gha
          cache-to:    type=gha,mode=max

      - name: Job Summary
        run: |
          echo "## ✅ DS Image Published" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build-unity.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Notify Backend + cập nhật .env.production trên VPS + push git tag ─
  notify-backend:
    name: "Notify Backend"
    runs-on: ubuntu-latest
    needs: [ build-unity, build-docker ]
    if: needs.build-docker.result == 'success'
    environment: NightHunt   # Đọc vars.VPS_BACKEND_URL + secrets VPS_HOST/VPS_USER/VPS_SSH_KEY
    permissions:
      contents: write         # Cần để push git tag

    steps:
      - name: Checkout (for git tag)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Bước 1: Gọi backend API để pull image mới vào Docker cache ngay lập tức
      - name: Notify backend - pull new image
        run: |
          VERSION="${{ needs.build-unity.outputs.version }}"
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          curl -s -f -X POST "${{ vars.VPS_BACKEND_URL }}/api/admin/ds/update-image" \
            -H "X-Admin-Secret: ${{ secrets.BACKEND_ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${VERSION}\",\"imageRef\":\"${IMAGE_REF}\"}" \
          && echo "✅ Backend notified — will pull ${IMAGE_REF}" \
          || echo "⚠️ Backend notify failed (non-fatal)"

      # Bước 2: SSH vào VPS để cập nhật DS_IMAGE_REF trong .env.production
      # → Sau khi backend khởi động lại (next deploy), sẽ dùng đúng image mới.
      - name: Update DS_IMAGE_REF in .env.production on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e
            VERSION="${{ needs.build-unity.outputs.version }}"
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
            ENV_FILE="/opt/nighthunt/.env.production"

            echo "=== Updating DS_IMAGE_REF → ${IMAGE_REF} ==="
            sed -i "s|^DS_IMAGE_REF=.*|DS_IMAGE_REF=${IMAGE_REF}|" "${ENV_FILE}"
            grep "DS_IMAGE_REF" "${ENV_FILE}"
            echo "✅ .env.production updated"

      # Bước 3: Push git tag để tracking phiên bản DS chính xác trên GHCR
      - name: Push git tag
        run: |
          VERSION="${{ needs.build-unity.outputs.version }}"
          TAG="ds/${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" \
            -m "DS image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          git push origin "${TAG}"
          echo "✅ Git tag pushed: ${TAG}"

      - name: Job Summary
        run: |
          VERSION="${{ needs.build-unity.outputs.version }}"
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          echo "## ✅ DS Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR push | \`${IMAGE_REF}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR push | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend notified | ${{ vars.VPS_BACKEND_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| .env.production | DS_IMAGE_REF updated |" >> $GITHUB_STEP_SUMMARY
          echo "| Git tag | \`ds/${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
