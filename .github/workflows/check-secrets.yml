name: "Check Secrets & Config"
# ─────────────────────────────────────────────────────────────────────────────
# Chạy workflow này để kiểm tra xem các secrets đã được setup đúng chưa.
# Không in ra giá trị thật — chỉ kiểm tra "có hay không".
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

jobs:
  check-secrets:
    name: "Verify All Secrets Present"
    runs-on: ubuntu-latest
    environment: NightHunt   # Cần để đọc VPS_BACKEND_URL
    steps:
      - name: Check secrets
        env:
          HAS_UNITY_LICENSE:        ${{ secrets.UNITY_LICENSE != '' }}
          HAS_UNITY_EMAIL:          ${{ secrets.UNITY_EMAIL != '' }}
          HAS_UNITY_PASSWORD:       ${{ secrets.UNITY_PASSWORD != '' }}
          HAS_BACKEND_ADMIN_SECRET: ${{ secrets.BACKEND_ADMIN_SECRET != '' }}
          HAS_VPS_HOST:             ${{ secrets.VPS_HOST != '' }}
          HAS_VPS_USER:             ${{ secrets.VPS_USER != '' }}
          HAS_VPS_SSH_KEY:          ${{ secrets.VPS_SSH_KEY != '' }}
          HAS_VPS_BACKEND_URL:      ${{ vars.VPS_BACKEND_URL != '' }}
          VPS_BACKEND_URL_VALUE:    ${{ vars.VPS_BACKEND_URL }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║   NightHunt Client — Secrets Checklist      ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          ALL_OK=true

          check() {
            local name=$1
            local present=$2
            local note=${3:-""}
            if [ "$present" = "true" ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name  ← MISSING  $note"
              ALL_OK=false
            fi
          }

          echo "--- Secrets (Settings → Secrets → Actions → Environment: NightHunt) ---"
          check "UNITY_LICENSE"        "$HAS_UNITY_LICENSE"        "(chạy unity-activation.yml trước để export)"
          check "UNITY_EMAIL"          "$HAS_UNITY_EMAIL"          "(email đăng nhập Unity account)"
          check "UNITY_PASSWORD"       "$HAS_UNITY_PASSWORD"       "(password Unity account)"
          check "BACKEND_ADMIN_SECRET" "$HAS_BACKEND_ADMIN_SECRET" "(= DS_ADMIN_SECRET trong .env.production)"
          check "VPS_HOST"             "$HAS_VPS_HOST"             "(IP hoặc domain của VPS, vd: vawnwuyest.me)"
          check "VPS_USER"             "$HAS_VPS_USER"             "(SSH user, thường là: ubuntu hoặc root)"
          check "VPS_SSH_KEY"          "$HAS_VPS_SSH_KEY"          "(private key SSH vào VPS — PEM format)"

          echo ""
          echo "--- Variables (Settings → Variables → Actions → Environment: NightHunt) ---"
          check "VPS_BACKEND_URL"      "$HAS_VPS_BACKEND_URL"      "(vd: https://vawnwuyest.me)"

          if [ -n "$VPS_BACKEND_URL_VALUE" ]; then
            echo "     └─ value: $VPS_BACKEND_URL_VALUE"
          fi

          echo ""
          echo "--- GITHUB_TOKEN (tự động — không cần setup thủ công) ---"
          echo "  ✅ GITHUB_TOKEN   (packages:write được khai báo trong build-docker job)"
          echo "     └─ Dùng để push Docker image lên ghcr.io (thay thế GHCR_TOKEN)"

          echo ""
          if [ "$ALL_OK" = "true" ]; then
            echo "  🎉 Tất cả secrets đã đủ! Có thể chạy build-dedicated-server.yml"
          else
            echo "  ⚠️  Một số secrets còn thiếu. Vào:"
            echo "     github.com/nvanquyet/nighthunt_client → Settings → Environments → NightHunt"
            echo "     → Environment secrets + Environment variables"
            exit 1
          fi
