name: "Unity License Activation"
# ─────────────────────────────────────────────────────────────────────────────
# Chạy workflow này MỘT LẦN để lấy file .alf → activate lên Unity website
# → download .ulf → copy nội dung vào secret UNITY_LICENSE.
#
# Sau khi có UNITY_LICENSE rồi thì workflow này không cần dùng nữa (có thể xóa).
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

jobs:
  activation:
    name: "Get Manual Activation File (.alf)"
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.3.14f1

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: "*.alf"
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# HƯỚNG DẪN SAU KHI CHẠY:
#
#  1. Vào Actions tab → chọn run này → download artifact "unity-activation-file"
#  2. Giải nén → lấy file .alf
#  3. Mở https://license.unity3d.com/manual
#  4. Upload file .alf → đăng nhập Unity ID → chọn "Unity Personal" / bản license bạn có
#  5. Download file .ulf về máy
#  6. Mở file .ulf bằng Notepad → Copy toàn bộ nội dung XML
#  7. Vào: https://github.com/nvanquyet/nighthunt_client/settings/secrets/actions
#  8. Tạo secret tên UNITY_LICENSE → paste nội dung XML vào
# ─────────────────────────────────────────────────────────────────────────────
